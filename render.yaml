# ─────────────────────────────────────────────────────────────────────────────
# Chat BullQ — API (NestJS + Prisma)  ·  Blueprint Render — TIER FREE
# Provisiona API (Docker) + PostgreSQL gerenciado + Key Value (Redis).
# Conecte ESTE repositório no Render via "New > Blueprint".
# Docs: https://render.com/docs/blueprint-spec
#
# ⚠️ FREE: Postgres expira em ~30 dias · web hiberna após 15min sem tráfego ·
#    web free NÃO suporta disco → uploads ficam efêmeros (somem a cada deploy).
#    Para produção, troque os planos (ver comentários) e re-adicione o disco.
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: chat-bullq-db
    databaseName: chat_bullq
    user: chat_bullq
    plan: free                 # produção: basic-256mb / basic-1gb+
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []            # somente conexões internas

services:
  # ── Redis / Key Value (filas BullMQ, presença, idempotência, sessões) ──
  - type: keyvalue
    name: chat-bullq-redis
    plan: free                 # free = 25MB. produção: starter+
    region: oregon
    ipAllowList: []            # somente acesso interno
    maxmemoryPolicy: noeviction  # OBRIGATÓRIO p/ BullMQ não descartar jobs

  # ── API NestJS (Docker) ──
  - type: web
    name: chat-bullq-api
    runtime: docker
    plan: free                 # produção: starter (sem hibernação + disco)
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /docs
    autoDeployTrigger: commit  # deploy automático a cada push
    # NOTA: no plano free não é permitido 'disk:'. Em produção, re-adicione:
    #   disk:
    #     name: uploads
    #     mountPath: /app/uploads
    #     sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: chat-bullq-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: chat-bullq-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: chat-bullq-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: UPLOADS_DIR
        value: /app/uploads
      - key: CORS_ORIGIN
        sync: false            # ex.: https://chat-bullq-web.onrender.com
      - key: APP_URL
        sync: false            # URL pública desta API
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
